<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festivals Calendar | Yatra Dham</title>
<meta name="description" content="Track upcoming Hindu festivals with live countdowns — Maha Shivratri, Navratri, Diwali, Rath Yatra and more.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header id="site-header"></header>
<section class="section" style="padding-top:48px;">
  <div class="container">
    <div class="breadcrumbs"><a href="index.html">Home</a> / Festivals</div>
    <span class="eyebrow">Live Countdown</span>
    <h1 class="section-title">Festivals Calendar</h1>
    <div class="divider-motif"></div>
    <p class="section-sub">Every major festival, with a running countdown to help you plan your yatra around it.</p>
    <div class="grid grid-4 mt-24" id="festGrid"></div>
  </div>
</section>
<footer id="site-footer"></footer>
<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/components.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const fests = YD.all("festivals").slice().sort((a,b) => new Date(a.date) - new Date(b.date));
    document.getElementById("festGrid").innerHTML = fests.map(f => festivalCardHTML(f)).join("") || '<div class="empty-state">No festivals added yet.</div>';
  });
</script>
</body>
</html>
